<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="45" fill="url(#bgGradient)"/>
  
  <!-- Simplified icon for smaller size -->
  <g transform="translate(96, 96)">
    <!-- Dollar sign -->
    <circle cx="-25" cy="-15" r="20" fill="none" stroke="white" stroke-width="4"/>
    <text x="-25" y="-8" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">$</text>
    
    <!-- Arrow -->
    <path d="M -8 -20 L 15 5" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <polygon points="15,5 8,3 10,10" fill="white"/>
    
    <!-- Local currency -->
    <circle cx="25" cy="15" r="20" fill="none" stroke="white" stroke-width="4"/>
    <text x="25" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">₦</text>
  </g>
</svg>
