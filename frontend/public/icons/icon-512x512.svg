<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Main icon: Currency exchange with arrow -->
  <g transform="translate(256, 256)">
    <!-- Dollar sign circle -->
    <circle cx="-60" cy="-30" r="45" fill="none" stroke="white" stroke-width="8"/>
    <text x="-60" y="-15" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">$</text>
    
    <!-- Arrow pointing right-down -->
    <path d="M -20 -40 L 40 20" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <polygon points="40,20 25,15 30,35" fill="white"/>
    
    <!-- Naira/Local currency circle -->
    <circle cx="60" cy="30" r="45" fill="none" stroke="white" stroke-width="8"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">₦</text>
  </g>
  
  <!-- Subtle grid pattern for finance theme -->
  <g opacity="0.1">
    <line x1="100" y1="0" x2="100" y2="512" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="512" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="512" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="512" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="512" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="512" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="512" y2="400" stroke="white" stroke-width="1"/>
  </g>
</svg>
